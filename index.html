document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    html, body { margin: 0; padding: 0; }\n    body {\n      font-family: 'Montserrat', system-ui, sans-serif;\n      color: #333333;\n      background: #FFFFFF;\n      -webkit-font-smoothing: antialiased;\n      text-rendering: optimizeLegibility;\n    }\n    * { box-sizing: border-box; }\n    html { scroll-behavior: smooth; }\n    input, select, textarea, button { font-family: inherit; }\n    ::selection { background: #C4A265; color: #fff; }\n    .pdo-cta-primary { transition: background-color 0.2s ease, transform 0.2s ease; }\n    .pdo-cta-primary:hover { background-color: #353535 !important; }\n    .pdo-cta-outline { transition: background-color 0.2s ease, color 0.2s ease; }\n    .pdo-cta-outline:hover { background-color: #000 !important; color: #fff !important; }\n    .pdo-field { transition: border-color 0.2s ease; }\n    .pdo-field:focus { outline: none; border-color: #2C3128; }\n    .pdo-nav-cta:hover { background-color: #353535 !important; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#FFFFFF;color:#333333;font-family:'Montserrat',sans-serif;font-size:16px;line-height:1.7;\">\n\n  <!-- ASSUMPTIONS BANNER (delete before launch) -->\n  <div style=\"background:#2C3128;color:#E8E4DE;padding:10px 24px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;text-align:center;\">\n    Mockup &nbsp;·&nbsp; Cormorant Garamond shown as a stand-in for The Seasons &nbsp;·&nbsp; Photos = placeholders for Gracie\n  <\u002Fdiv>\n\n  <!-- ============ HERO (header overlaps as part of hero) ============ -->\n  <section id=\"top\" style=\"position:relative;min-height:92vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#1a1a1a;\">\n    <!-- Image placeholder (golden-hour aerial exterior) -->\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:linear-gradient(135deg, #6b4a2a 0%, #8a5a30 25%, #3a2614 60%, #1a1208 100%);\"><\u002Fdiv>\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 70% 25%, rgba(196,162,101,0.45) 0%, rgba(196,162,101,0.10) 35%, transparent 65%);\"><\u002Fdiv>\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 14px, rgba(0,0,0,0.012) 14px 28px);\"><\u002Fdiv>\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.20) 50%, rgba(0,0,0,0.55) 100%);\"><\u002Fdiv>\n\n    <!-- ============ HEADER (overlapping the hero) ============ -->\n    <header style=\"position:absolute;top:0;left:0;right:0;z-index:50;\">\n      <div style=\"max-width:1280px;margin:0 auto;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n        <a href=\"#top\" style=\"display:inline-flex;align-items:center;text-decoration:none;\">\n          <sc-if value=\"{{ logoIsWhite }}\" hint-placeholder-val=\"{{ true }}\">\n            <img src=\"f989d45c-e950-4b92-aa13-a68faaffba72\" alt=\"Paradiso\" style=\"height:36px;width:auto;display:block;filter:brightness(0) invert(1);\">\n          <\u002Fsc-if>\n          <sc-if value=\"{{ logoIsDark }}\" hint-placeholder-val=\"{{ false }}\">\n            <img src=\"3ca197b1-8b8f-4064-9fdb-d2b14cbc0333\" alt=\"Paradiso\" style=\"height:36px;width:auto;display:block;\">\n          <\u002Fsc-if>\n        <\u002Fa>\n        <a href=\"#founding\" style=\"{{ ctaStyle }}\" style-hover=\"{{ ctaStyleHover }}\">{{ ctaLabel }}<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- placeholder note -->\n    <div style=\"position:absolute;left:24px;bottom:24px;font-family:'JetBrains Mono', ui-monospace, monospace;font-size:10px;letter-spacing:0.18em;color:rgba(255,255,255,0.45);text-transform:uppercase;\">\n      [ Photo · Hero · Aerial exterior, golden hour, pool + group-scale ]\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:2;max-width:880px;padding:120px 32px;text-align:center;color:#FFFFFF;\">\n      <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:#D9BD83;margin-bottom:28px;\">\n        Early Access Now Open, at 50% Off\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(40px, 5.4vw, 64px);line-height:1.12;letter-spacing:-0.005em;color:#FFFFFF;margin:0 auto 28px;max-width:780px;text-wrap:balance;\">\n        If you’d rather be on the trip than planning it, <em style=\"font-style:italic;\">you’re in the right place.<\u002Fem><br>\n        Welcome to Paradiso.\n      <\u002Fh1>\n      <p style=\"font-family:'Montserrat',sans-serif;font-size:17px;font-weight:300;line-height:1.65;color:#F2EDE3;max-width:620px;margin:0 auto 44px;\">\n        You pick the home, Paradiso handles everything that everyone else forgets — so the trip is something to enjoy, not something to run.\n      <\u002Fp>\n      <a href=\"#founding\" class=\"pdo-cta-primary\" style=\"display:inline-block;background:#000000;color:#FFFFFF;text-decoration:none;font-family:'Marcellus',serif;font-size:17px;letter-spacing:0.18em;text-transform:uppercase;padding:20px 44px;\">\n        Get Early Access\n      <\u002Fa>\n      <div style=\"margin-top:80px;display:flex;justify-content:center;\">\n        <div aria-hidden=\"true\" style=\"width:1px;height:48px;background:linear-gradient(180deg, transparent, rgba(255,255,255,0.6), transparent);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 1 — THE PROBLEM ============ -->\n  <section style=\"background:#F7F4EF;padding:120px 32px;\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"text-align:center;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:#C4A265;margin-bottom:24px;\">\n        The Problem\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(36px, 4.2vw, 52px);line-height:1.15;color:#2C3128;text-align:center;margin:0 0 48px;letter-spacing:-0.005em;text-wrap:balance;\">\n        Every group trip starts with a plan <em style=\"font-style:italic;\">nobody<\u002Fem> wants to make.\n      <\u002Fh2>\n\n      <div style=\"font-family:'Montserrat',sans-serif;font-size:16px;line-height:1.85;color:#333333;\">\n        <p style=\"margin:0 0 22px;\">Planning a group trip means dozens of tabs open, group chats that never reach a decision, and a booking on Airbnb that looks great in photos but comes with zero guarantees.<\u002Fp>\n        <p style=\"margin:0 0 22px;\">You spend weeks coordinating. You cross your fingers at check-in. And when something isn’t right, you’re on your own figuring it out.<\u002Fp>\n        <p style=\"margin:0 0 22px;\">That’s the version most people settle for.<\u002Fp>\n        <p style=\"margin:0 0 22px;\"><strong style=\"font-weight:600;color:#2C3128;\">Paradiso is built for people who don’t want to ‘just settle.’<\u002Fstrong><\u002Fp>\n        <p style=\"margin:0 0 22px;\">One team handles everything before you arrive. The home has been inspected, stocked, and held to a standard you can actually count on. And if something isn’t right, you have one person to call who knows how to fix it, fast.<\u002Fp>\n        <p style=\"margin:0 0 0;\">No tabs. No group chats going in circles. No crossing your fingers at the door.<\u002Fp>\n      <\u002Fdiv>\n\n      <blockquote style=\"margin:64px 0 0;padding:8px 0 8px 28px;border-left:2px solid #C4A265;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:clamp(24px, 2.5vw, 30px);line-height:1.35;color:#2C3128;\">\n        “You didn’t sign up to manage a trip. You signed up to enjoy it.”\n      <\u002Fblockquote>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 2 — THE SOLUTION ============ -->\n  <section style=\"background:#FFFFFF;padding:120px 32px;\">\n    <div style=\"max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.05fr 0.95fr;gap:80px;align-items:center;\">\n      <div>\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:#C4A265;margin-bottom:22px;\">\n          Meet Paradiso\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(34px, 4vw, 48px);line-height:1.15;color:#2C3128;margin:0 0 28px;letter-spacing:-0.005em;text-wrap:balance;\">\n          The space of a private home. The service of a dedicated team. <em style=\"font-style:italic;\">All in one place.<\u002Fem>\n        <\u002Fh2>\n        <p style=\"margin:0 0 18px;font-size:16px;line-height:1.8;color:#333333;\">\n          Paradiso is built around one idea: your group should never have to choose between being together and being taken care of.\n        <\u002Fp>\n        <p style=\"margin:0 0 18px;font-size:16px;line-height:1.8;color:#333333;\">\n          Every Paradiso home is curated for groups — the space, the layout, the amenities — and held to four non-negotiable pillars: <strong style=\"color:#2C3128;font-weight:600;\">Sleep, Cleanliness, Design, and Service.<\u002Fstrong> Every stay is backed by a concierge team that handles the details before you arrive and the cleanup after you leave.\n        <\u002Fp>\n        <p style=\"margin:0 0 36px;font-size:16px;line-height:1.8;color:#333333;\">\n          Your only job is to show up and have a great time. We handle the rest.\n        <\u002Fp>\n        <a href=\"#founding\" class=\"pdo-cta-primary\" style=\"display:inline-block;background:#000000;color:#FFFFFF;text-decoration:none;font-family:'Marcellus',serif;font-size:15px;letter-s dient(180deg, #2C3128 0%, #1c1f1a 100%);\"><\u002Fdiv>\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, rgba(196,162,101,0.18) 0%, transparent 65%);\"><\u002Fdiv>\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 14px, rgba(0,0,0,0.012) 14px 28px);\"><\u002Fdiv>\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:rgba(0,0,0,0.45);\"><\u002Fdiv>\n\n    <div style=\"position:absolute;left:24px;bottom:24px;font-family:'JetBrains Mono', ui-monospace, monospace;font-size:10px;letter-spacing:0.18em;color:rgba(255,255,255,0.35);text-transform:uppercase;\">\n      [ Photo · Aerial overhead · Dark overlay 50–60% ]\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:2;max-width:780px;margin:0 auto;text-align:center;\">\n      <img src=\"f8a4ef96-1d26-40ff-a543-1444aca9343e\" alt=\"\" aria-hidden=\"true\" style=\"height:28px;width:auto;display:inline-block;opacity:0.7;margin-bottom:40px;filter:brightness(0) invert(1);\">\n      <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(30px, 3.6vw, 44px);line-height:1.3;color:#FFFFFF;margin:0;letter-spacing:-0.005em;text-wrap:balance;\">\n        “The home doesn’t change with membership. Just the experience around it.”\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 6 — FOUNDING MEMBER CTA ============ -->\n  <section id=\"founding\" style=\"background:#F7F4EF;padding:120px 32px;border-top:1px solid #C4A265;\">\n    <div style=\"max-width:680px;margin:0 auto;text-align:center;\">\n      <div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:#C4A265;margin-bottom:24px;\">\n        Founding Member Access\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(36px, 4.2vw, 52px);line-height:1.15;color:#2C3128;margin:0 0 28px;letter-spacing:-0.005em;text-wrap:balance;\">\n        Lock in your place before the doors open to <em style=\"font-style:italic;\">the public.<\u002Fem>\n      <\u002Fh2>\n      <p style=\"margin:0 auto 40px;max-width:600px;font-size:16px;line-height:1.8;color:#333;\">\n        For $100, applied in full as a credit toward your membership or first stay, you lock in priority placement before public enrollment opens — and first access to new properties as the collection expands.\n      <\u002Fp>\n\n      <!-- Price badge -->\n      <div style=\"display:inline-flex;align-items:center;gap:20px;background:#FFFFFF;border:1px solid #C4A265;padding:20px 28px;margin-bottom:48px;text-align:left;\">\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:44px;line-height:1;color:#2C3128;\">$100<\u002Fdiv>\n        <div style=\"width:1px;align-self:stretch;background:#E8E4DE;\"><\u002Fdiv>\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:13px;line-height:1.5;color:#555;max-width:240px;\">\n          Fully credited toward your <strong style=\"color:#2C3128;font-weight:600;\">membership or first stay.<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <a href=\"#lead\" class=\"pdo-cta-primary\" style=\"display:inline-block;background:#000000;color:#FFFFFF;text-decoration:none;font-family:'Marcellus',serif;font-size:16px;letter-spacing:0.16em;text-transform:uppercase;padding:22px 44px;line-height:1.3;\">\n          Reserve Your Founding Member Spot — <span style=\"color:#D9BD83;\">Now at 50% Off<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n      <p style=\"margin:24px 0 0;font-family:'Montserrat',sans-serif;font-size:12px;letter-spacing:0.06em;color:#9A9690;\">\n        Limited founding cohort. Pricing returns to full at public launch.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 7 — LEAD CAPTURE ============ -->\n  <section id=\"lead\" style=\"background:#FFFFFF;padding:120px 32px;\">\n    <div style=\"max-width:520px;margin:0 auto;\">\n      <div style=\"text-align:center;margin-bottom:48px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:#C4A265;margin-bottom:22px;\">\n          Stay in Touch\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(34px, 4vw, 48px);line-height:1.15;color:#2C3128;margin:0 0 20px;letter-spacing:-0.005em;text-wrap:balance;\">\n          Not ready to commit <em style=\"font-style:italic;\">yet?<\u002Fem>\n        <\u002Fh2>\n        <p style=\"margin:0;font-size:16px;line-height:1.7;color:#555;\">\n          Join the early access list and we’ll reach out when Founding Member pricing is about to end.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <form onsubmit=\"{{ onSubmitLead }}\" style=\"display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n          <label style=\"display:flex;flex-direction:column;gap:8px;\">\n            <span style=\"font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#2C3128;\">First Name<\u002Fspan>\n            <input type=\"text\" name=\"firstName\" class=\"pdo-field\" style=\"border:1px solid #D8D2C7;background:#FFFFFF;padding:14px 14px;font-family:'Montserrat',sans-serif;font-size:15px;color:#2C3128;border-radius:0;\">\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:8px;\">\n            <span style=\"font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#2C3128;\">Last Name<\u002Fspan>\n            <input type=\"text\" name=\"lastName\" class=\"pdo-field\" style=\"border:1px solid #D8D2C7;background:#FFFFFF;padding:14px 14px;font-family:'Montserrat',sans-serif;font-size:15px;color:#2C3128;border-radius:0;\">\n          <\u002Flabel>\n        <\u002Fdiv>\n        <label style=\"display:flex;flex-direction:column;gap:8px;\">\n          <span style=\"font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#2C3128;\">Email<\u002Fspan>\n          <input type=\"email\" name=\"email\" class=\"pdo-field\" style=\"border:1px solid #D8D2C7;background:#FFFFFF;padding:14px 14px;font-family:'Montserrat',sans-serif;font-size:15px;color:#2C3128;border-radius:0;\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:8px;\">\n          <span style=\"font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#2C3128;\">How many trips do you take per year?<\u002Fspan>\n          <select name=\"frequency\" class=\"pdo-field\" style=\"border:1px solid #D8D2C7;background:#FFFFFF;padding:14px 14px;font-family:'Montserrat',sans-serif;font-size:15px;color:#2C3128;border-radius:0;appearance:none;\">\n            <option>Select one<\u002Foption>\n            <option>1–2 trips<\u002Foption>\n            <option>3–5 trips<\u002Foption>\n            <option>6+ trips<\u002Foption>\n          <\u002Fselect>\n        <\u002Flabel>\n\n        <button type=\"submit\" class=\"pdo-cta-primary\" style=\"margin-top:8px;width:100%;background:#000000;color:#FFFFFF;border:none;font-family:'Marcellus',serif;font-size:16px;letter-spacing:0.18em;text-transform:uppercase;padding:20px 28px;cursor:pointer;border-radius:0;\">\n          Join the Early Access List\n        <\u002Fbutton>\n        <p style=\"margin:4px 0 0;text-align:center;font-size:12px;color:#9A9690;letter-spacing:0.04em;\">\n          No spam. One email when the cohort closes.\n        <\u002Fp>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#2C3128;color:#E8E4DE;padding:96px 32px 40px;\">\n    <div style=\"max-width:720px;margin:0 auto;text-align:center;\">\n      <img src=\"9903bbe7-0623-42d3-ad25-f3cb5bdb17c2\" alt=\"Paradiso\" style=\"height:96px;width:auto;display:inline-block;filter:invert(1) brightness(1.05);margin-bottom:32px;\">\n      <p style=\"margin:0 0 40px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;line-height:1.5;color:#E8E4DE;max-width:520px;margin-left:auto;margin-right:auto;text-wrap:balance;\">\n        No chore lists. No compromises. No choosing between space and service. Just a good time.\n      <\u002Fp>\n      <div aria-hidden=\"true\" style=\"height:1px;background:rgba(232,228,222,0.18);margin:0 auto 28px;max-width:480px;\"><\u002Fdiv>\n      <p style=\"margin:0;font-family:'Montserrat',sans-serif;font-size:12px;letter-spacing:0.08em;color:rgba(232,228,222,0.55);\">\n        © 2026 Paradiso Homes. All rights reserved.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440},&quot;headerLogoVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;white&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;white&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;headerCtaLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Get Early Access&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;headerCtaVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;solid&quot;,&quot;outline&quot;,&quot;ghost&quot;],&quot;default&quot;:&quot;solid&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;headerCtaBg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#000000&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;headerCtaText&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FFFFFF&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    // ----- Header tweak props -----\n    const logoVariant = this.props.headerLogoVariant ?? \"white\";\n    const ctaLabel   = this.props.headerCtaLabel    ?? \"Get Early Access\";\n    const ctaVariant = this.props.headerCtaVariant  ?? \"solid\";\n    const ctaBg      = this.props.headerCtaBg       ?? \"#000000\";\n    const ctaText    = this.props.headerCtaText     ?? \"#FFFFFF\";\n\n    const logoIsDark  = logoVariant === \"dark\";\n    const logoIsWhite = !logoIsDark;\n\n    const ctaBase = {\n      display: \"inline-block\",\n      textDecoration: \"none\",\n      fontFamily: \"'Marcellus', serif\",\n      fontSize: \"14px\",\n      letterSpacing: \"0.16em\",\n      textTransform: \"uppercase\",\n      padding: \"14px 26px\",\n      cursor: \"pointer\",\n      transition: \"background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease\",\n      lineHeight: 1.2,\n    };\n\n    let ctaStyle, ctaStyleHover;\n    if (ctaVariant === \"outline\") {\n      ctaStyle      = { ...ctaBase, background: \"transparent\", color: ctaText, border: `1px solid ${ctaText}` };\n      ctaStyleHover = { background: ctaText, color: ctaBg, borderColor: ctaText };\n    } else if (ctaVariant === \"ghost\") {\n      ctaStyle      = { ...ctaBase, background: \"transparent\", color: ctaText, border: \"1px solid transparent\" };\n      ctaStyleHover = { background: \"rgba(255,255,255,0.12)\", borderColor: \"rgba(255,255,255,0.4)\" };\n    } else { // solid\n      ctaStyle      = { ...ctaBase, background: ctaBg, color: ctaText, border: `1px solid ${ctaBg}` };\n      ctaStyleHover = { background: \"#353535\", borderColor: \"#353535\", color: ctaText };\n    }\n\n    return {\n      logoIsWhite,\n      logoIsDark,\n      ctaLabel,\n      ctaStyle,\n      ctaStyleHover,\n      onSubmitLead: (e) => {\n        e.preventDefault();\n        const f = e.target;\n        const data = {\n          firstName: f.firstName.value,\n          lastName: f.lastName.value,\n          email: f.email.value,\n          frequency: f.frequency.value,\n        };\n        console.log('[Paradiso lead]', data);\n        alert(\"Thanks — you’re on the early access list. We’ll reach out before Founding Member pricing closes.\");\n        f.reset();\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
